name: Collect KAMIS Data

on:
  schedule:
    # 매일 오전 6시 KST = UTC 21:00 (전일)
    - cron: "0 21 * * *"
  workflow_dispatch:
    # 수동 실행 + 소급 수집 옵션
    inputs:
      date:
        description: "수집 날짜 (YYYY-MM-DD, 비워두면 오늘)"
        required: false
      backfill:
        description: "소급 수집 일수 (예: 365)"
        required: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: collector/requirements.txt

      - name: Install dependencies
        run: pip install -r collector/requirements.txt

      - name: Run collector (scheduled / manual single date)
        if: ${{ !inputs.backfill }}
        env:
          KAMIS_API_KEY:    ${{ secrets.KAMIS_API_KEY }}
          KAMIS_CERT_KEY:   ${{ secrets.KAMIS_CERT_KEY }}
          INFLUXDB_URL:     ${{ secrets.INFLUXDB_URL }}
          INFLUXDB_TOKEN:   ${{ secrets.INFLUXDB_TOKEN }}
          INFLUXDB_ORG:     ${{ secrets.INFLUXDB_ORG }}
          INFLUXDB_BUCKET:  ${{ secrets.INFLUXDB_BUCKET }}
        run: |
          cd collector
          if [ -n "${{ inputs.date }}" ]; then
            python collect_kamis.py --date ${{ inputs.date }}
          else
            python collect_kamis.py
          fi

      - name: Run collector (backfill)
        if: ${{ inputs.backfill }}
        env:
          KAMIS_API_KEY:    ${{ secrets.KAMIS_API_KEY }}
          KAMIS_CERT_KEY:   ${{ secrets.KAMIS_CERT_KEY }}
          INFLUXDB_URL:     ${{ secrets.INFLUXDB_URL }}
          INFLUXDB_TOKEN:   ${{ secrets.INFLUXDB_TOKEN }}
          INFLUXDB_ORG:     ${{ secrets.INFLUXDB_ORG }}
          INFLUXDB_BUCKET:  ${{ secrets.INFLUXDB_BUCKET }}
        run: |
          cd collector
          python collect_kamis.py --backfill ${{ inputs.backfill }}
