name: Collect Auction Settlement

on:
  schedule:
    # 매일 오전 8시 KST = UTC 23:00 (collect_price_history 21:00 이후 실행하여 quota 충돌 방지)
    - cron: "0 23 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "수집 날짜 (YYYY-MM-DD, 비워두면 어제)"
        required: false
      backfill:
        description: "소급 수집 일수 (예: 365)"
        required: false
      from_date:
        description: "범위 백필 시작일 (YYYY-MM-DD)"
        required: false
      to_date:
        description: "범위 백필 종료일 (YYYY-MM-DD, 기본: 오늘)"
        required: false
      chunk_days:
        description: "1회 실행 최대 처리 일수 (백필 시 50 권장, 기본: 제한 없음)"
        required: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt

      - name: Run collector
        env:
          KAMIS_API_KEY:        ${{ secrets.KAMIS_API_KEY }}
          INFLUXDB_URL:         ${{ secrets.INFLUXDB_URL }}
          INFLUXDB_TOKEN:       ${{ secrets.INFLUXDB_TOKEN }}
          INFLUXDB_ORG:         ${{ secrets.INFLUXDB_ORG }}
          INFLUXDB_BUCKET:      ${{ secrets.INFLUXDB_BUCKET }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ -n "${{ inputs.from_date }}" ]; then
            for m in 1101 2100 2200 2300 2401 2501 2601; do
              python collect_auction_settlement.py --market $m \
                --from-date ${{ inputs.from_date }} \
                ${{ inputs.to_date && format('--to-date {0}', inputs.to_date) || '' }} \
                ${{ inputs.chunk_days && format('--chunk-days {0}', inputs.chunk_days) || '' }}
            done
          elif [ -n "${{ inputs.backfill }}" ]; then
            for m in 1101 2100 2200 2300 2401 2501 2601; do
              python collect_auction_settlement.py --market $m --backfill ${{ inputs.backfill }}
            done
          elif [ -n "${{ inputs.date }}" ]; then
            for m in 1101 2100 2200 2300 2401 2501 2601; do
              python collect_auction_settlement.py --market $m --date ${{ inputs.date }}
            done
          else
            # auto-backfill 모드: 각 시장별로 Supabase 최신 날짜 확인 후 자동 진행
            for m in 1101 2100 2200 2300 2401 2501 2601; do
              python collect_auction_settlement.py --market $m \
                ${{ inputs.chunk_days && format('--chunk-days {0}', inputs.chunk_days) || '' }}
            done
          fi
