name: Collect Auction Origin

on:
  schedule:
    # 매일 오전 7시 30분 KST = UTC 22:30
    - cron: "30 22 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "수집 날짜 (YYYY-MM-DD)"
        required: false
      backfill:
        description: "소급 수집 일수 (예: 90)"
        required: false
      from_date:
        description: "범위 백필 시작일 (YYYY-MM-DD)"
        required: false
      to_date:
        description: "범위 백필 종료일 (YYYY-MM-DD)"
        required: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collector (auction origin)
        env:
          KAMIS_API_KEY:        ${{ secrets.KAMIS_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          # katOrigin API는 6자리 시장코드 사용
          # 서울(가락/강서), 부산(엄궁/반여), 대구(북부), 인천(남촌/삼산)
          MARKETS="110001 110008 210001 210009 220001 230001 230003"
          if [ -n "${{ inputs.from_date }}" ]; then
            for m in $MARKETS; do
              python collect_auction_origin.py --market $m \
                --from-date ${{ inputs.from_date }} \
                ${{ inputs.to_date && format('--to-date {0}', inputs.to_date) || '' }}
            done
          elif [ -n "${{ inputs.backfill }}" ]; then
            for m in $MARKETS; do
              python collect_auction_origin.py --market $m --backfill ${{ inputs.backfill }}
            done
          else
            for m in $MARKETS; do
              python collect_auction_origin.py --market $m \
                ${{ inputs.date && format('--date {0}', inputs.date) || '' }}
            done
          fi
