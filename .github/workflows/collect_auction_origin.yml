name: Collect Auction Origin

on:
  schedule:
    # 매일 오전 7시 30분 KST = UTC 22:30
    - cron: "30 22 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "수집 날짜 (YYYY-MM-DD)"
        required: false
      backfill:
        description: "소급 수집 일수 (예: 90)"
        required: false
      from_date:
        description: "범위 백필 시작일 (YYYY-MM-DD)"
        required: false
      to_date:
        description: "범위 백필 종료일 (YYYY-MM-DD)"
        required: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collector (auction origin)
        env:
          KAMIS_API_KEY:        ${{ secrets.KAMIS_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          # katOrigin API는 6자리 시장코드 사용 (전국 공영도매시장 33개소)
          # 서울: 가락(110001) 강서(110008)
          # 부산: 엄궁(210001) 국제수산(210005) 반여(210009)
          # 대구: 북부(220001)
          # 인천: 남촌(230001) 삼산(230003)
          # 광주: 각화(240001) 서부(240004)
          # 대전: 오정(250001) 노은(250003)
          # 경기: 수원(310101) 안양(310401) 안산(310901) 구리(311201)
          # 강원: 춘천(320101) 원주(320201) 강릉(320301)
          # 충북: 청주(330101) 충주(330201)
          # 충남: 천안(340101)
          # 전북: 전주(350101) 익산(350301) 정읍(350402)
          # 전남: 순천(360301)
          # 경북: 포항(370101) 안동(370401) 구미(371501)
          # 경남: 창원팔용(380101) 울산(380201) 창원내서(380303) 진주(380401)
          MARKETS="110001 110008 210001 210005 210009 220001 230001 230003 240001 240004 250001 250003 310101 310401 310901 311201 320101 320201 320301 330101 330201 340101 350101 350301 350402 360301 370101 370401 371501 380101 380201 380303 380401"
          if [ -n "${{ inputs.from_date }}" ]; then
            for m in $MARKETS; do
              python collect_auction_origin.py --market $m \
                --from-date ${{ inputs.from_date }} \
                ${{ inputs.to_date && format('--to-date {0}', inputs.to_date) || '' }}
            done
          elif [ -n "${{ inputs.backfill }}" ]; then
            for m in $MARKETS; do
              python collect_auction_origin.py --market $m --backfill ${{ inputs.backfill }}
            done
          else
            for m in $MARKETS; do
              python collect_auction_origin.py --market $m \
                ${{ inputs.date && format('--date {0}', inputs.date) || '' }}
            done
          fi
