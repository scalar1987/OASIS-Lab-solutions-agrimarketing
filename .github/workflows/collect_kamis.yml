name: Collect KAMIS Data

on:
  schedule:
    # 매일 오전 6시 KST = UTC 21:00 (전일)
    - cron: "0 21 * * *"
  workflow_dispatch:
    # 수동 실행 + 소급 수집 옵션
    inputs:
      date:
        description: "수집 날짜 (YYYY-MM-DD, 비워두면 오늘)"
        required: false
      backfill:
        description: "소급 수집 일수 (예: 365)"
        required: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collector (scheduled / manual single date)
        if: ${{ !inputs.backfill }}
        env:
          KAMIS_API_KEY:    ${{ secrets.KAMIS_API_KEY }}
          INFLUXDB_URL:     ${{ secrets.INFLUXDB_URL }}
          INFLUXDB_TOKEN:   ${{ secrets.INFLUXDB_TOKEN }}
          INFLUXDB_ORG:     ${{ secrets.INFLUXDB_ORG }}
          INFLUXDB_BUCKET:  ${{ secrets.INFLUXDB_BUCKET }}
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            python collect_kamis.py --date ${{ inputs.date }}
          else
            python collect_kamis.py
          fi


      - name: Run collector (auction origin)
        if: ${{ !inputs.backfill }}
        env:
          KAMIS_API_KEY:    ${{ secrets.KAMIS_API_KEY }}
        run: |
          # 전국 공영도매시장 whsl_mrkt_cd 목록
          for m in 1101 2100 2200 2300 2401 2501 2601; do
            python collect_auction_origin.py --market $m
          done

      - name: Run collector (auction settlement)
        if: ${{ !inputs.backfill }}
        env:
          KAMIS_API_KEY:    ${{ secrets.KAMIS_API_KEY }}
          INFLUXDB_URL:     ${{ secrets.INFLUXDB_URL }}
          INFLUXDB_TOKEN:   ${{ secrets.INFLUXDB_TOKEN }}
          INFLUXDB_ORG:     ${{ secrets.INFLUXDB_ORG }}
          INFLUXDB_BUCKET:  ${{ secrets.INFLUXDB_BUCKET }}
        run: |
          for m in 1101 2100 2200 2300 2401 2501 2601; do
            python collect_auction_settlement.py --market $m
          done

      - name: Run collector (shipment sequel)
        if: ${{ !inputs.backfill }}
        env:
          KAMIS_API_KEY:    ${{ secrets.KAMIS_API_KEY }}
        run: |
          python collect_shipment_sequel.py
      - name: Run collector (backfill)
        if: ${{ inputs.backfill }}
        env:
          KAMIS_API_KEY:    ${{ secrets.KAMIS_API_KEY }}
          INFLUXDB_URL:     ${{ secrets.INFLUXDB_URL }}
          INFLUXDB_TOKEN:   ${{ secrets.INFLUXDB_TOKEN }}
          INFLUXDB_ORG:     ${{ secrets.INFLUXDB_ORG }}
          INFLUXDB_BUCKET:  ${{ secrets.INFLUXDB_BUCKET }}
        run: |
          python collect_kamis.py --backfill ${{ inputs.backfill }}
