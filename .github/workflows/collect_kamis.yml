name: Collect KAMIS Data

on:
  schedule:
    # 매일 오전 6시 KST = UTC 21:00 (전일)
    - cron: "0 21 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "수집 날짜 (YYYY-MM-DD, 비워두면 오늘)"
        required: false
      backfill:
        description: "소급 수집 일수 (예: 90) — 오늘 기준 N일 전"
        required: false
      from_date:
        description: "범위 백필 시작일 (YYYY-MM-DD)"
        required: false
      to_date:
        description: "범위 백필 종료일 (YYYY-MM-DD, 기본: 오늘)"
        required: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 범위 백필 (from_date / to_date) ─────────────────────
      - name: Run collector (range backfill)
        if: ${{ inputs.from_date }}
        env:
          KAMIS_API_KEY:       ${{ secrets.KAMIS_API_KEY }}
          INFLUXDB_URL:        ${{ secrets.INFLUXDB_URL }}
          INFLUXDB_TOKEN:      ${{ secrets.INFLUXDB_TOKEN }}
          INFLUXDB_ORG:        ${{ secrets.INFLUXDB_ORG }}
          INFLUXDB_BUCKET:     ${{ secrets.INFLUXDB_BUCKET }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python collect_kamis.py \
            --from-date ${{ inputs.from_date }} \
            ${{ inputs.to_date && format('--to-date {0}', inputs.to_date) || '' }}

      # ── N일 백필 (backfill) ──────────────────────────────────
      - name: Run collector (backfill N days)
        if: ${{ inputs.backfill && !inputs.from_date }}
        env:
          KAMIS_API_KEY:        ${{ secrets.KAMIS_API_KEY }}
          INFLUXDB_URL:         ${{ secrets.INFLUXDB_URL }}
          INFLUXDB_TOKEN:       ${{ secrets.INFLUXDB_TOKEN }}
          INFLUXDB_ORG:         ${{ secrets.INFLUXDB_ORG }}
          INFLUXDB_BUCKET:      ${{ secrets.INFLUXDB_BUCKET }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python collect_kamis.py --backfill ${{ inputs.backfill }}

      # ── 일별 정기 수집 (스케줄 / 단일 날짜) ─────────────────
      - name: Run collector (daily)
        if: ${{ !inputs.backfill && !inputs.from_date }}
        env:
          KAMIS_API_KEY:        ${{ secrets.KAMIS_API_KEY }}
          INFLUXDB_URL:         ${{ secrets.INFLUXDB_URL }}
          INFLUXDB_TOKEN:       ${{ secrets.INFLUXDB_TOKEN }}
          INFLUXDB_ORG:         ${{ secrets.INFLUXDB_ORG }}
          INFLUXDB_BUCKET:      ${{ secrets.INFLUXDB_BUCKET }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ -n "${{ inputs.date }}" ]; then
            python collect_kamis.py --date ${{ inputs.date }}
          else
            python collect_kamis.py
          fi

      - name: Run collector (auction origin)
        if: ${{ !inputs.backfill && !inputs.from_date }}
        env:
          KAMIS_API_KEY:        ${{ secrets.KAMIS_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          for m in 1101 2100 2200 2300 2401 2501 2601; do
            python collect_auction_origin.py --market $m
          done

      - name: Run collector (auction settlement)
        if: ${{ !inputs.backfill && !inputs.from_date }}
        env:
          KAMIS_API_KEY:    ${{ secrets.KAMIS_API_KEY }}
          INFLUXDB_URL:     ${{ secrets.INFLUXDB_URL }}
          INFLUXDB_TOKEN:   ${{ secrets.INFLUXDB_TOKEN }}
          INFLUXDB_ORG:     ${{ secrets.INFLUXDB_ORG }}
          INFLUXDB_BUCKET:  ${{ secrets.INFLUXDB_BUCKET }}
        run: |
          for m in 1101 2100 2200 2300 2401 2501 2601; do
            python collect_auction_settlement.py --market $m
          done

      - name: Run collector (shipment sequel)
        if: ${{ !inputs.backfill && !inputs.from_date }}
        env:
          KAMIS_API_KEY:    ${{ secrets.KAMIS_API_KEY }}
        run: |
          python collect_shipment_sequel.py

      # ── 가격 등락 정보 (전국 평균 + 등락율) ─────────────────────
      - name: Run collector (rises and falls)
        env:
          KAMIS_API_KEY:        ${{ secrets.KAMIS_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          if [ -n "${{ inputs.from_date }}" ]; then
            python collect_rises_falls.py \
              --from-date ${{ inputs.from_date }} \
              ${{ inputs.to_date && format('--to-date {0}', inputs.to_date) || '' }}
          elif [ -n "${{ inputs.backfill }}" ]; then
            python collect_rises_falls.py --backfill ${{ inputs.backfill }}
          elif [ -n "${{ inputs.date }}" ]; then
            python collect_rises_falls.py --date ${{ inputs.date }}
          else
            python collect_rises_falls.py
          fi
